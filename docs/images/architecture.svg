<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f72585"/></marker>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="35" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">Architecture Overview</text>
  
  <!-- Input -->
  <rect x="30" y="65" width="140" height="55" rx="10" fill="#1a1e2e" stroke="#f72585" stroke-width="1.5"/>
  <text x="100" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#f72585" text-anchor="middle">🐍 Python Source</text>
  <text x="100" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Code to analyze</text>

  <line x1="170" y1="92" x2="210" y2="92" stroke="#f72585" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- AST Parser -->
  <rect x="215" y="65" width="120" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="275" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">🌳 AST Parser</text>
  <text x="275" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Parse source tree</text>

  <!-- Metrics Row -->
  <line x1="275" y1="120" x2="275" y2="155" stroke="#f72585" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Metrics boxes -->
  <rect x="30" y="160" width="130" height="50" rx="8" fill="#1a1e2e" stroke="#f72585" stroke-width="1.5"/>
  <text x="95" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#f72585" text-anchor="middle">🔄 Cyclomatic CC</text>
  <text x="95" y="198" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Path complexity</text>

  <rect x="175" y="160" width="130" height="50" rx="8" fill="#1a1e2e" stroke="#f72585" stroke-width="1.5"/>
  <text x="240" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#f72585" text-anchor="middle">🧠 Cognitive</text>
  <text x="240" y="198" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Mental effort</text>

  <rect x="320" y="160" width="130" height="50" rx="8" fill="#1a1e2e" stroke="#f72585" stroke-width="1.5"/>
  <text x="385" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#f72585" text-anchor="middle">📐 Halstead</text>
  <text x="385" y="198" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Volume metric</text>

  <rect x="465" y="160" width="130" height="50" rx="8" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="530" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle">📏 Line Counter</text>
  <text x="530" y="198" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Code/blank/comments</text>

  <rect x="610" y="160" width="140" height="50" rx="8" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="680" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle">📦 Dependencies</text>
  <text x="680" y="198" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Import analysis</text>

  <!-- Connect to metrics -->
  <line x1="275" y1="155" x2="95" y2="160" stroke="#f72585" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="275" y1="155" x2="240" y2="160" stroke="#f72585" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="275" y1="155" x2="385" y2="160" stroke="#f72585" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="335" y1="120" x2="530" y2="160" stroke="#f72585" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="335" y1="120" x2="680" y2="160" stroke="#f72585" stroke-width="1" marker-end="url(#arrowhead)"/>

  <!-- Maintainability Index -->
  <line x1="240" y1="210" x2="300" y2="250" stroke="#f72585" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="250" y="255" width="180" height="55" rx="10" fill="#1a1e2e" stroke="#f72585" stroke-width="2"/>
  <text x="340" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#f72585" text-anchor="middle">📊 Maintainability Index</text>
  <text x="340" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">0-100 score (Good/Mod/Poor)</text>

  <!-- LLM Suggestions -->
  <rect x="480" y="255" width="180" height="55" rx="10" fill="#1a1e2e" stroke="#f72585" stroke-width="2"/>
  <text x="570" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#f72585" text-anchor="middle">🤖 AI Suggestions</text>
  <text x="570" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Ollama-powered advice</text>

  <line x1="430" y1="282" x2="480" y2="282" stroke="#f72585" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Trends -->
  <rect x="30" y="255" width="160" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="110" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">📈 Trend Tracking</text>
  <text x="110" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Historical metrics</text>

  <line x1="250" y1="282" x2="190" y2="282" stroke="#f72585" stroke-width="1" marker-end="url(#arrowhead)"/>

  <rect x="30" y="345" width="740" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="400" y="370" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">🔒 100% Local • 5 Complexity Metrics • AI Suggestions • Trend Tracking</text>
</svg>
